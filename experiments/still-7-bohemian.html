<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Still 7 — Bohemian Matrix Eigenvalues</title>
  <style>
    body { margin: 0; background: #FAF9F6; overflow: hidden; }
    canvas { display: block; }
    .label {
      position: fixed; bottom: 20px; left: 20px;
      font-family: 'Inter', sans-serif; font-size: 13px; color: #999;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="label">7 — Bohemian matrix eigenvalues: organic ring/disc/bridge structures from your research</div>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const PARAMS = {
      dotSize: 1.2,
      dotColor: [140, 135, 125],
      dotOpacityMax: 0.15,
      // Viewport from the eigenvalue data: maps complex plane coords to screen
      // We'll auto-fit based on the data bounds
    };

    ctx.fillStyle = '#FAF9F6';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    fetch('eigenvalues.json')
      .then(r => r.json())
      .then(data => {
        const frame = data.frame2;
        const xs = frame.x;
        const ys = frame.y;

        // Find bounds
        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        for (let i = 0; i < xs.length; i++) {
          if (xs[i] < minX) minX = xs[i];
          if (xs[i] > maxX) maxX = xs[i];
          if (ys[i] < minY) minY = ys[i];
          if (ys[i] > maxY) maxY = ys[i];
        }

        // Add padding
        const rangeX = maxX - minX;
        const rangeY = maxY - minY;
        const pad = 0.15;
        minX -= rangeX * pad;
        maxX += rangeX * pad;
        minY -= rangeY * pad;
        maxY += rangeY * pad;

        // Scale to fit screen while preserving aspect ratio
        const dataAspect = (maxX - minX) / (maxY - minY);
        const screenAspect = canvas.width / canvas.height;

        const zoom = 1.3; // 30% zoom in
        let scaleX, scaleY, offsetX, offsetY;
        if (screenAspect > dataAspect) {
          scaleY = canvas.height / (maxY - minY) * zoom;
          scaleX = scaleY;
          offsetX = (canvas.width - (maxX - minX) * scaleX) / 2;
          offsetY = (canvas.height - (maxY - minY) * scaleY) / 2;
        } else {
          scaleX = canvas.width / (maxX - minX) * zoom;
          scaleY = scaleX;
          offsetX = (canvas.width - (maxX - minX) * scaleX) / 2;
          offsetY = (canvas.height - (maxY - minY) * scaleY) / 2;
        }

        function toScreen(x, y) {
          return [
            (x - minX) * scaleX + offsetX,
            (y - minY) * scaleY + offsetY
          ];
        }

        // Draw all eigenvalue dots
        for (let i = 0; i < xs.length; i++) {
          const [sx, sy] = toScreen(xs[i], ys[i]);

          // Skip if off screen
          if (sx < -5 || sx > canvas.width + 5 || sy < -5 || sy > canvas.height + 5) continue;

          const opacity = PARAMS.dotOpacityMax * (0.4 + Math.random() * 0.6);

          ctx.beginPath();
          ctx.arc(sx, sy, PARAMS.dotSize * (0.7 + Math.random() * 0.6), 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${PARAMS.dotColor.join(',')}, ${opacity})`;
          ctx.fill();
        }
      });
  </script>
</body>
</html>
