<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bohemian Matrix — Particle Lifecycle</title>
  <style>
    body { margin: 0; background: #FAF9F6; overflow: hidden; }
    canvas { display: block; }
    .label {
      position: fixed; bottom: 20px; left: 20px;
      font-family: 'Inter', sans-serif; font-size: 13px; color: #999;
      z-index: 10;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="label">Bohemian eigenvalues — individual dot lifecycles</div>
  <script>
    // ---- TUNABLE PARAMETERS ----
    const PARAMS = {
      dotSize: 0.7,              // base dot radius px
      dotSizeVariance: 0.3,      // random size variance
      dotColor: [130, 125, 115],
      dotOpacityMax: 0.12,       // peak opacity of a dot at full life

      // Lifecycle
      spawnRate: 800,            // dots spawned per frame (~30fps → ~24000/sec)
      maxParticles: 60000,       // max alive particles at once
      lifetimeMin: 3,            // min lifetime in seconds
      lifetimeMax: 10,           // max lifetime in seconds
      fadeInRatio: 0.15,         // fraction of life spent fading in
      fadeOutRatio: 0.4,         // fraction of life spent fading out

      // View
      zoom: 1.3,
      cycleDuration: 180,        // seconds for full matrix cycle

      // Mobile
      mobileSpawnRate: 200,
      mobileMaxParticles: 15000,
    };

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const isMobile = /Mobi|Android/i.test(navigator.userAgent) || window.innerWidth < 768;
    const spawnRate = isMobile ? PARAMS.mobileSpawnRate : PARAMS.spawnRate;
    const maxParticles = isMobile ? PARAMS.mobileMaxParticles : PARAMS.maxParticles;

    // ---- DATA ----
    let frames = [];
    let numFrames = 0;
    let pointsPerFrame = 0;
    let globalBounds = { minX: Infinity, maxX: -Infinity, minY: Infinity, maxY: -Infinity };

    fetch('eigenvalues_dense.bin')
      .then(r => r.arrayBuffer())
      .then(buffer => {
        const header = new Uint16Array(buffer, 0, 2);
        numFrames = header[0];
        pointsPerFrame = header[1];

        const dataOffset = 4;
        const floatsPerFrame = pointsPerFrame * 2;
        const bytesPerFrame = floatsPerFrame * 4;

        for (let f = 0; f < numFrames; f++) {
          const offset = dataOffset + f * bytesPerFrame;
          const frame = new Float32Array(buffer, offset, floatsPerFrame);
          frames.push(frame);

          for (let i = 0; i < frame.length; i += 2) {
            const x = frame[i], y = frame[i + 1];
            if (x < globalBounds.minX) globalBounds.minX = x;
            if (x > globalBounds.maxX) globalBounds.maxX = x;
            if (y < globalBounds.minY) globalBounds.minY = y;
            if (y > globalBounds.maxY) globalBounds.maxY = y;
          }
        }

        const rx = globalBounds.maxX - globalBounds.minX;
        const ry = globalBounds.maxY - globalBounds.minY;
        const pad = 0.1;
        globalBounds.minX -= rx * pad;
        globalBounds.maxX += rx * pad;
        globalBounds.minY -= ry * pad;
        globalBounds.maxY += ry * pad;

        requestAnimationFrame(animate);
      });

    // ---- PARTICLE SYSTEM ----
    // Each particle: [screenX, screenY, birthTime, lifetime, sizeFactor]
    // Using flat arrays for performance
    const PX = new Float32Array(maxParticles);
    const PY = new Float32Array(maxParticles);
    const BIRTH = new Float32Array(maxParticles);
    const LIFE = new Float32Array(maxParticles);
    const SIZE = new Float32Array(maxParticles);
    let particleCount = 0;

    function toScreen(x, y) {
      const bw = globalBounds.maxX - globalBounds.minX;
      const bh = globalBounds.maxY - globalBounds.minY;
      const dataAspect = bw / bh;
      const screenAspect = W / H;
      let scale;
      if (screenAspect > dataAspect) {
        scale = H / bh * PARAMS.zoom;
      } else {
        scale = W / bw * PARAMS.zoom;
      }
      const cx = (W - bw * scale) / 2;
      const cy = (H - bh * scale) / 2;
      return [
        (x - globalBounds.minX) * scale + cx,
        (y - globalBounds.minY) * scale + cy
      ];
    }

    function spawnParticle(now, frame) {
      if (particleCount >= maxParticles) return;

      // Pick a random eigenvalue from the current frame
      const idx = Math.floor(Math.random() * pointsPerFrame) * 2;
      const ex = frame[idx];
      const ey = frame[idx + 1];

      const [sx, sy] = toScreen(ex, ey);

      // Skip if offscreen
      if (sx < -20 || sx > W + 20 || sy < -20 || sy > H + 20) return;

      const i = particleCount;
      PX[i] = sx;
      PY[i] = sy;
      BIRTH[i] = now;
      LIFE[i] = PARAMS.lifetimeMin + Math.random() * (PARAMS.lifetimeMax - PARAMS.lifetimeMin);
      SIZE[i] = PARAMS.dotSize * (1 - PARAMS.dotSizeVariance + Math.random() * PARAMS.dotSizeVariance * 2);
      particleCount++;
    }

    function removeParticle(i) {
      particleCount--;
      PX[i] = PX[particleCount];
      PY[i] = PY[particleCount];
      BIRTH[i] = BIRTH[particleCount];
      LIFE[i] = LIFE[particleCount];
      SIZE[i] = SIZE[particleCount];
    }

    let prevTime = 0;

    function animate(timestamp) {
      requestAnimationFrame(animate);

      const now = timestamp / 1000;
      if (!prevTime) prevTime = now;
      // Throttle to ~30fps
      if (now - prevTime < 0.030) return;
      prevTime = now;

      // Current interpolation position
      const progress = (now % PARAMS.cycleDuration) / PARAMS.cycleDuration;
      const framePos = progress * numFrames;
      const frameIdx = Math.floor(framePos) % numFrames;
      const currentFrame = frames[frameIdx];

      // Spawn new particles
      for (let s = 0; s < spawnRate; s++) {
        spawnParticle(now, currentFrame);
      }

      // Clear
      ctx.fillStyle = '#FAF9F6';
      ctx.fillRect(0, 0, W, H);

      // Draw & cull particles
      const col = PARAMS.dotColor.join(',');
      let i = 0;
      while (i < particleCount) {
        const age = now - BIRTH[i];
        const life = LIFE[i];

        // Dead?
        if (age >= life) {
          removeParticle(i);
          continue;
        }

        // Compute opacity envelope
        const ageRatio = age / life;
        let opacity;
        if (ageRatio < PARAMS.fadeInRatio) {
          // Fade in
          opacity = ageRatio / PARAMS.fadeInRatio;
        } else if (ageRatio > (1 - PARAMS.fadeOutRatio)) {
          // Fade out
          opacity = (1 - ageRatio) / PARAMS.fadeOutRatio;
        } else {
          opacity = 1;
        }
        opacity *= PARAMS.dotOpacityMax;

        ctx.beginPath();
        ctx.arc(PX[i], PY[i], SIZE[i], 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${col},${opacity})`;
        ctx.fill();

        i++;
      }
    }
  </script>
</body>
</html>
